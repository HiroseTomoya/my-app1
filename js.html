<script>
  // =========================================
  // 状態管理
  // =========================================
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;
  let currentMode = 'view'; // 'submit', 'view', 'allshift', 'admin'
  let activeMyShiftTab = 'confirmed'; // 'confirmed', 'desired'
  let currentStaffId = null;
  let currentStaffName = null;
  let currentStaffRole = null; // '一般' or '管理者'
  let currentStaffDefaultPosition = null;
  const selectedDates = new Set();
  const shiftRequests = new Map();    // 従業員の希望提出用 (dateStr -> {start, end, memo})
  const confirmedShifts = new Map();  // 個人の確定シフト (dateStr -> {start, end, restTime, position})
  const monthlyAllShifts = new Map(); // 全員の確定シフト (dateStr -> [{userId, name, start, end, position}])
  const holidays = new Map();         // 祝日データ (dateStr -> holidayName)
  // 管理者編集用 (userId -> { shifts: { day -> {start, end, restTime, position} } })
  let adminStaffData = [];
  let selectedAdminDate = null;
  let hasUnsavedChanges = false; // 希望提出の未保存状態を追跡
  let currentCalendarView = 'calendar'; // 'calendar' or 'matrix'
  let currentHalfPeriod = 'all'; // 'all', 'first', 'second'
  // 15分単位の時間リスト
  const timeOptions = [];
  for (let h = 0; h < 24; h++) {
    const hh = String(h).padStart(2, '0');
    for (let m = 0; m < 60; m += 15) {
      const mm = String(m).padStart(2, '0');
      timeOptions.push(`${hh}:${mm}`);
    }
  }
  document.addEventListener('DOMContentLoaded', () => {
    initTimeDropdowns();
    // Enterキーでログイン
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('login-staff-id').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });
    checkAutoLogin();
    window.addEventListener('beforeunload', e => {
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  });
  // =========================================
  // 初期化
  // =========================================
  function initTimeDropdowns() {
    const ids = ['input-start', 'admin-edit-start', 'input-end', 'admin-edit-end', 'admin-edit-rest-start', 'admin-edit-rest-end'];
    const defaultStart = '17:00';
    ids.forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      // 既存の「指定なし」「休み」オプション等は残しつつ時間リストを追加するため、一旦中身のオプション要素以外のテキストをクリア
      // しかし、既にHTMLに<option value="">指定なし</option>が書いてあるので、innerHTML=''にすると消えてしまう。
      // なので、idごとに初期設定を行う
      if (id === 'input-start' || id === 'admin-edit-start') {
        sel.innerHTML = '';
        if (id === 'admin-edit-start') {
          const optOff = document.createElement('option');
          optOff.value = '休み';
          optOff.textContent = '休み（シフトなし）';
          sel.appendChild(optOff);
        }
      } else {
        sel.innerHTML = '<option value="">指定なし</option>';
      }
      timeOptions.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        if (t === defaultStart) opt.selected = true;
        sel.appendChild(opt);
      });
    });
  }
  // =========================================
  // 認証
  // =========================================
  async function sha256(ascii) {
    if (window.crypto && window.crypto.subtle) {
      try {
        const msgBuffer = new TextEncoder().encode(ascii);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      } catch(e) {}
    }
    // Lightweight Pure JS SHA-256 fallback for environments where crypto.subtle is unavailable
    function rightRotate(value, amount) { return (value>>>amount) | (value<<(32 - amount)); };
    var mathPow = Math.pow, maxWord = mathPow(2, 32), lengthProperty = 'length', i, j, result = '';
    var words = [], asciiBitLength = ascii[lengthProperty]*8, hash = sha256.h = sha256.h || [], k = sha256.k = sha256.k || [];
    var primeCounter = k[lengthProperty], isComposite = {};
    for (var candidate = 2; primeCounter < 64; candidate++) {
      if (!isComposite[candidate]) {
        for (i = 0; i < 313; i += candidate) isComposite[i] = candidate;
        hash[primeCounter] = (mathPow(candidate, .5)*maxWord)|0;
        k[primeCounter++] = (mathPow(candidate, 1/3)*maxWord)|0;
      }
    }
    ascii += '\x80';
    while (ascii[lengthProperty]%64 - 56) ascii += '\x00';
    for (i = 0; i < ascii[lengthProperty]; i++) {
      j = ascii.charCodeAt(i);
      if (j>>8) return; 
      words[i>>2] |= j << ((3 - i)%4)*8;
    }
    words[words[lengthProperty]] = ((asciiBitLength/maxWord)|0);
    words[words[lengthProperty]] = (asciiBitLength);
    for (j = 0; j < words[lengthProperty];) {
      var w = words.slice(j, j += 16), oldHash = hash;
      hash = hash.slice(0, 8);
      for (i = 0; i < 64; i++) {
        var w15 = w[i - 15], w2 = w[i - 2];
        var a = hash[0], e = hash[4];
        var temp1 = hash[7] + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e&hash[5])^((~e)&hash[6])) + k[i] + (w[i] = (i < 16) ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15>>>3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2>>>10)))|0);
        var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
        hash = [(temp1 + temp2)|0].concat(hash);
        hash[4] = (hash[4] + temp1)|0;
      }
      for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i])|0;
    }
    for (i = 0; i < 8; i++) {
      for (j = 3; j + 1; j--) {
        var b = (hash[i]>>(j*8))&255;
        result += ((b < 16) ? 0 : '') + b.toString(16);
      }
    }
    return result;
  }
  function checkAutoLogin() {
    const savedId   = localStorage.getItem('shift_app_staff_id');
    const savedName = localStorage.getItem('shift_app_staff_name');
    const savedRole = localStorage.getItem('shift_app_staff_role');
    const savedPos  = localStorage.getItem('shift_app_staff_default_position');
    if (savedId && savedName) {
      currentStaffId = savedId;
      currentStaffName = savedName;
      currentStaffRole = savedRole || '一般';
      currentStaffDefaultPosition = savedPos || 'ホール';
      finishLogin();
    }
  }
  async function handleLogin() {
    const staffId = document.getElementById('login-staff-id').value.trim();
    const pwd     = document.getElementById('login-password').value;
    const err     = document.getElementById('login-error');
    const btn     = document.getElementById('login-btn');
    err.textContent = '';
    if (!staffId) { err.textContent = 'ユーザーIDを入力してください。'; return; }
    if (!pwd)     { err.textContent = 'パスワードを入力してください。'; return; }
    btn.disabled = true;
    btn.textContent = '認証中...';
    const pwdHash = await sha256(pwd);
    if (typeof google === 'undefined') {
      // デモ用ローカルモック
      const demoUsers = {
        '001': { hash: '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4', name: '山田 太郎', role: '一般', pos: 'キッチン' },
        '002': { hash: '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4', name: '佐藤 花子', role: '一般', pos: 'ホール' },
        '003': { hash: '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4', name: '鈴木 一郎', role: '一般', pos: 'リーダー' },
        'admin': { hash: '9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08', name: '管理者', role: '管理者', pos: '社員' },
      };
      const user = demoUsers[staffId];
      if (user && user.hash === pwdHash) {
        setLoginSession(staffId, user.name, user.role, user.pos);
        finishLogin();
      } else {
        err.textContent = 'ユーザーIDまたはパスワードが正しくありません。';
        btn.disabled = false;
        btn.textContent = 'ログイン';
      }
      return;
    }
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          setLoginSession(res.staff.id, res.staff.name, res.staff.role, res.staff.defaultPosition);
          finishLogin();
        } else {
          err.textContent = res.message;
          btn.disabled = false;
          btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:1.1rem; vertical-align:middle;">login</span> ログイン';
        }
      })
      .withFailureHandler(e => {
        err.textContent = 'エラーが発生しました。しばらくしてから再試行してください。';
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:1.1rem; vertical-align:middle;">login</span> ログイン';
      })
      .authenticateStaff(staffId, pwdHash);
  }
  function setLoginSession(id, name, role, pos) {
    currentStaffId = id;
    currentStaffName = name;
    currentStaffRole = role;
    currentStaffDefaultPosition = pos;
    localStorage.setItem('shift_app_staff_id', id);
    localStorage.setItem('shift_app_staff_name', name);
    localStorage.setItem('shift_app_staff_role', role);
    localStorage.setItem('shift_app_staff_default_position', pos);
  }
  function logout() {
    if (hasUnsavedChanges && !confirm('未保存の変更があります。ログアウトしますか？')) return;
    if (!hasUnsavedChanges && !confirm('ログアウトしますか？')) return;
    hasUnsavedChanges = false;
    localStorage.removeItem('shift_app_staff_id');
    localStorage.removeItem('shift_app_staff_name');
    localStorage.removeItem('shift_app_staff_role');
    localStorage.removeItem('shift_app_staff_default_position');
    currentStaffId = currentStaffName = currentStaffRole = currentStaffDefaultPosition = null;
    document.getElementById('login-staff-id').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:1.1rem; vertical-align:middle;">login</span> ログイン';
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('login-modal').classList.add('show');
  }
  function finishLogin() {
    document.getElementById('login-modal').classList.remove('show');
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('sidebar-user-name').textContent = currentStaffName;
    document.getElementById('sidebar-avatar').textContent = currentStaffName.charAt(0);
    if (currentStaffRole === '管理者') {
      document.getElementById('nav-admin-li').style.display = 'block';
      document.getElementById('nav-section-admin').style.display = 'block';
      switchMode('admin');
    } else {
      document.getElementById('nav-admin-li').style.display = 'none';
      document.getElementById('nav-section-admin').style.display = 'none';
      switchMode('view');
    }
  }
  // =========================================
  // カレンダー制御
  // =========================================
  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    selectedDates.clear();
    refreshData();
  }
  function switchCalendarView(viewType) {
    currentCalendarView = viewType;
    document.getElementById('view-btn-cal').classList.toggle('active', viewType === 'calendar');
    document.getElementById('view-btn-matrix').classList.toggle('active', viewType === 'matrix');
    
    if (viewType === 'calendar') {
      document.querySelector('.calendar-grid').style.display = 'block';
      document.getElementById('matrix-area').style.display = 'none';
    } else {
      document.querySelector('.calendar-grid').style.display = 'none';
      document.getElementById('matrix-area').style.display = 'block';
      renderMatrix();
    }
  }
  function switchHalfPeriod(period) {
    currentHalfPeriod = period;
    document.getElementById('half-btn-all').classList.toggle('active', period === 'all');
    document.getElementById('half-btn-first').classList.toggle('active', period === 'first');
    document.getElementById('half-btn-second').classList.toggle('active', period === 'second');
    renderCalendar();
  }
  // 月選択ピッカー
  let pickerYear = new Date().getFullYear();
  function openMonthPicker() {
    pickerYear = currentYear;
    document.getElementById('picker-year').textContent = `${pickerYear}年`;
    renderPickerMonths();
    document.getElementById('month-picker-modal').classList.add('show');
  }
  function closeMonthPicker() {
    document.getElementById('month-picker-modal').classList.remove('show');
  }
  function changePickerYear(delta) {
    pickerYear += delta;
    document.getElementById('picker-year').textContent = `${pickerYear}年`;
    renderPickerMonths();
  }
  function renderPickerMonths() {
    const container = document.getElementById('picker-months');
    container.innerHTML = '';
    for (let m = 1; m <= 12; m++) {
      const btn = document.createElement('button');
      const isActive = (pickerYear === currentYear && m === currentMonth);
      btn.className = isActive ? 'btn-add' : 'btn-secondary';
      btn.style.cssText = 'padding:0.6rem 0; font-size:0.95rem; font-weight:700; border-radius:var(--radius-md);';
      btn.textContent = `${m}月`;
      btn.addEventListener('click', () => {
        currentYear = pickerYear;
        currentMonth = m;
        selectedDates.clear();
        closeMonthPicker();
        refreshData();
      });
      container.appendChild(btn);
    }
  }
  function handlePeriodChange() {
    selectedDates.clear();
    updateBatchInputUI();
    renderCalendar();
    if (currentMode === 'admin') loadAdminDesiredShifts();
  }
  function setLoadingState(isLoading) {
    const calCard = document.getElementById('calendar-area');
    const matrixArea = document.getElementById('matrix-area');
    if (isLoading) {
      calCard.style.opacity = '0.5';
      calCard.style.pointerEvents = 'none';
      matrixArea.style.opacity = '0.5';
      matrixArea.style.pointerEvents = 'none';
    } else {
      calCard.style.opacity = '1';
      calCard.style.pointerEvents = 'auto';
      matrixArea.style.opacity = '1';
      matrixArea.style.pointerEvents = 'auto';
    }
  }
  function refreshData() {
    renderCalendar();
    let holidayDone = false, dataDone = false;
    function tryFinalRender() {
      if (holidayDone && dataDone) renderCalendar();
    }
    loadHolidays(() => { holidayDone = true; tryFinalRender(); });
    const loader =
      currentMode === 'view'     ? loadConfirmedShifts :
      currentMode === 'submit'   ? loadSavedShiftRequests :
      currentMode === 'allshift' ? loadMonthlyAllShifts :
      currentMode === 'admin'    ? loadAdminDesiredShifts : null;
    if (loader) loader(() => { dataDone = true; tryFinalRender(); });
  }
  // =========================================
  // 祝日の読み込み
  // =========================================
  let _holidayCache = {}; // { 'YYYY-MM': Map }
  function loadHolidays(callback) {
    const key = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
    if (_holidayCache[key]) {
      holidays.clear();
      for (const [k, v] of _holidayCache[key]) {
        holidays.set(k, v);
      }
      if (callback) callback();
      return;
    }
    holidays.clear();
    if (typeof google === 'undefined') {
      // デモ用祝日
      const demoHolidays = {
        '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日',
        '2026-03-20':'春分の日','2026-04-29':'昭和の日','2026-05-03':'憲法記念日',
        '2026-05-04':'みどりの日','2026-05-05':'こどもの日','2026-07-20':'海の日',
        '2026-08-11':'山の日','2026-09-21':'敬老の日','2026-09-23':'秋分の日',
        '2026-10-12':'スポーツの日','2026-11-03':'文化の日','2026-11-23':'勤労感謝の日',
      };
      Object.entries(demoHolidays).forEach(([d, n]) => {
        if (d.startsWith(key)) holidays.set(d, n);
      });
      _holidayCache[key] = new Map(holidays);
      if (callback) callback();
      return;
    }
    google.script.run
      .withSuccessHandler(res => {
        Object.keys(res).forEach(d => holidays.set(d, res[d]));
        _holidayCache[key] = new Map(holidays);
        if (callback) callback();
      })
      .withFailureHandler(() => { if (callback) callback(); })
      .getHolidays(currentYear, currentMonth);
  }
  // =========================================
  // カレンダー描画
  // =========================================
  function renderCalendar() {
    document.getElementById('calendar-title').textContent = `${currentYear}年${currentMonth}月`;
    const body     = document.getElementById('calendar-body');
    body.innerHTML = '';
    const today     = new Date();
    const todayStr  = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const firstDay  = new Date(currentYear, currentMonth - 1, 1).getDay();
    const lastDate  = new Date(currentYear, currentMonth, 0).getDate();
    // 常に1ヶ月分を表示
    // カレンダーグリッドの先頭: 月初の曜日オフセット
    let offsetDay = firstDay; 

    for (let i = 0; i < offsetDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      body.appendChild(empty);
    }
    for (let i = 1; i <= lastDate; i++) {
      const dateStr    = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const cell       = document.createElement('div');
      cell.className   = 'cal-cell';

      // 前半/後半フィルター
      if (currentMode === 'submit') {
        if (currentHalfPeriod === 'first' && i > 15) { cell.classList.add('half-hidden'); }
        if (currentHalfPeriod === 'second' && i <= 15) { cell.classList.add('half-hidden'); }
      }

      const dayOfWeek  = new Date(currentYear, currentMonth - 1, i).getDay();
      const isHoliday  = holidays.has(dateStr);
      const isToday    = (dateStr === todayStr);
      const isSun      = dayOfWeek === 0;
      const isSat      = dayOfWeek === 6;
      if (isHoliday) cell.classList.add('holiday');
      if (isToday)   cell.classList.add('today');
      let dateNumClass = 'cell-date-num';
      if (isSun || isHoliday) dateNumClass += ' text-red';
      if (isSat)               dateNumClass += ' text-blue';
      let innerHTML = `<div class="cell-date"><span class="${dateNumClass}">${i}</span></div>`;
      if (isHoliday) {
        innerHTML += `<div class="holiday-name-label">${holidays.get(dateStr)}</div>`;
      }
      // ===== モード別コンテンツ =====
      if (currentMode === 'submit') {
        const isInPeriod = true;
        if (shiftRequests.has(dateStr)) {
          const s = shiftRequests.get(dateStr);
          cell.classList.add('has-shift');
          const timeText = (s.start === 'フリー') ? 'フリー' : `${s.start}〜`;
          innerHTML += `<div class="cell-shift">${timeText}</div>`;
        }
        if (selectedDates.has(dateStr)) cell.classList.add('selected');
        cell.innerHTML = innerHTML;
        if (isInPeriod) {
          cell.addEventListener('click', () => toggleDateSelection(dateStr, cell));
        } else {
          cell.style.cursor = 'default';
        }
      }
      else if (currentMode === 'view') {
        if (selectedDates.has(dateStr)) cell.classList.add('selected');
        if (activeMyShiftTab === 'confirmed') {
          if (confirmedShifts.has(dateStr)) {
            const s = confirmedShifts.get(dateStr);
            cell.classList.add('has-confirmed-shift');
            const timeText = (s.start === 'フリー') ? 'フリー' : `${s.start}〜`;
            innerHTML += `<div class="cell-shift">${timeText}</div>`;
          }
          cell.innerHTML = innerHTML;
          cell.addEventListener('click', () => {
            selectedDates.clear();
            selectedDates.add(dateStr);
            renderCalendar();
            showConfirmedDetail(dateStr);
          });
        } else {
          if (shiftRequests.has(dateStr)) {
            const s = shiftRequests.get(dateStr);
            cell.classList.add('has-shift');
            const timeText = (s.start === 'フリー') ? 'フリー' : `${s.start}〜`;
            innerHTML += `<div class="cell-shift">${timeText}</div>`;
          }
          cell.innerHTML = innerHTML;
          cell.addEventListener('click', () => {
            selectedDates.clear();
            selectedDates.add(dateStr);
            renderCalendar();
            showDesiredDetail(dateStr);
          });
        }
      }
      else if (currentMode === 'allshift') {
        const isMobile = window.innerWidth <= 900;
        const members  = monthlyAllShifts.has(dateStr) ? monthlyAllShifts.get(dateStr) : [];
        let badgesHtml = '';
        if (members.length > 0) {
          // ポジション別に集計
          const posGroups = {};
          members.forEach(m => {
            const pos = m.position || 'その他';
            if (!posGroups[pos]) posGroups[pos] = [];
            posGroups[pos].push(m);
          });

          const maxNames = isMobile ? 3 : 6;
          let shown = 0;
          badgesHtml += '<div class="cell-members-container">';

          // 自分を最優先、次に社員、その後ポジション順
          const meFirst = members.filter(m => m.userId === currentStaffId);
          const staff = members.filter(m => m.userId !== currentStaffId && (m.position === '社員' || m.position === 'リーダー'));
          const others = members.filter(m => m.userId !== currentStaffId && m.position !== '社員' && m.position !== 'リーダー');
          const sortedMembers = [...meFirst, ...staff, ...others];

          for (const m of sortedMembers) {
            if (shown >= maxNames) break;
            const shortName = m.name.split(/\s+/)[0];
            const pos = m.position || 'その他';
            const isMe = m.userId === currentStaffId;
            badgesHtml += `<span class="cell-name-chip ${pos}" ${isMe ? 'style="outline:2px solid var(--c-primary); outline-offset:-1px;"' : ''}>${shortName}</span>`;
            shown++;
          }

          if (members.length > maxNames) {
            badgesHtml += `<span class="cell-more-chip">+${members.length - maxNames}</span>`;
          }
          badgesHtml += '</div>';

          // 合計人数
          badgesHtml += `<div class="cell-total-count">${members.length}人</div>`;
        }
        innerHTML += badgesHtml;
        cell.innerHTML = innerHTML;
        cell.addEventListener('click', () => openCoworkersModal(dateStr));
      }
      else if (currentMode === 'admin') {
        const isInPeriod = true;
        let desiredCount = 0, confirmedCount = 0;
        if (adminStaffData.length > 0 && isInPeriod) {
          adminStaffData.forEach(staff => {
            const dayData = staff.shifts[i];
            if (dayData && dayData.desired)   desiredCount++;
            if (dayData && dayData.confirmed) confirmedCount++;
          });
        }
        const totalStaff = adminStaffData.length;
        if (isInPeriod && (desiredCount > 0 || confirmedCount > 0)) {
          innerHTML += '<div class="cell-admin-stats">';
          if (desiredCount > 0) {
            innerHTML += `<div class="cell-admin-badge desired">希${desiredCount}</div>`;
          }
          if (confirmedCount > 0) {
            innerHTML += `<div class="cell-admin-badge confirmed">確${confirmedCount}</div>`;
          }
          innerHTML += '</div>';
          // プログレスバー
          if (desiredCount > 0) {
            const pct = Math.round((confirmedCount / desiredCount) * 100);
            innerHTML += `<div class="cell-admin-progress-label">確定率 ${pct}%</div>`;
            innerHTML += `<div class="cell-admin-progress"><div class="cell-admin-progress-bar" style="width:${pct}%"></div></div>`;
          }
        }
        // セルの状態別クラス
        if (confirmedCount > 0 && confirmedCount >= desiredCount && desiredCount > 0) {
          cell.classList.add('admin-all-confirmed');
        } else if (confirmedCount > 0) {
          cell.classList.add('admin-partial');
        } else if (desiredCount > 0) {
          cell.classList.add('admin-has-desired');
        }
        cell.innerHTML = innerHTML;
        if (isInPeriod) {
          cell.addEventListener('click', () => showAdminDailyPanel(i, dateStr));
          if (selectedAdminDate === dateStr) cell.classList.add('selected');
        } else {
          cell.style.cursor = 'default';
        }
      }
      body.appendChild(cell);
    }
    
    if (currentCalendarView === 'matrix' && (currentMode === 'allshift' || currentMode === 'admin')) {
      renderMatrix();
    }
  }
  
  // =========================================
  // マトリクス描画
  // =========================================
  function renderMatrix() {
    const thead = document.getElementById('matrix-header-row');
    const tbody = document.getElementById('matrix-body');
    thead.innerHTML = '<th class="matrix-name-col">名前</th>';
    tbody.innerHTML = '';
    
    const lastDate = new Date(currentYear, currentMonth, 0).getDate();
    const dayNames = ['日','月','火','水','木','金','土'];
    
    // ヘッダー作成 (1日〜末日)
    for (let i = 1; i <= lastDate; i++) {
      const dayOfWeek = new Date(currentYear, currentMonth - 1, i).getDay();
      const isSun = dayOfWeek === 0;
      const isSat = dayOfWeek === 6;
      let colorStyle = '';
      if (isSun) colorStyle = 'color:var(--c-red);';
      if (isSat) colorStyle = 'color:var(--c-blue);';
      const th = document.createElement('th');
      th.style.cssText = colorStyle;
      th.innerHTML = `${i} <span style="font-size:0.7rem;opacity:0.8;">${dayNames[dayOfWeek]}</span>`;
      if (currentMode === 'allshift') {
        th.style.cursor = 'pointer';
        const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        th.addEventListener('click', () => openCoworkersModal(dateStr));
      }
      thead.appendChild(th);
    }
    
    // 役職グループ定義
    const groups = ['社員', 'ホール', 'キッチン'];
    
    if (currentMode === 'admin') {
      if (!adminStaffData || adminStaffData.length === 0) return;
      
      // グループごとにスタッフを分類
      const staffByGroup = { '社員': [], 'ホール': [], 'キッチン': [], 'その他': [] };
      adminStaffData.forEach(staff => {
        const pos = staff.defaultPosition;
        if (staff.role === '管理者' || staff.role === '社員' || pos === '社員') {
          staffByGroup['社員'].push(staff);
        } else if (pos === 'ホール') {
          staffByGroup['ホール'].push(staff);
        } else if (pos === 'キッチン') {
          staffByGroup['キッチン'].push(staff);
        } else {
          staffByGroup['その他'].push(staff);
        }
      });
      
      const renderStaffRow = (staff, staffIdx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="matrix-name-col">${staff.name}</td>`;
        for (let i = 1; i <= lastDate; i++) {
          const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
          const td = document.createElement('td');
          td.className = 'matrix-cell-clickable';
          
          const dayData = staff.shifts[i] || {};
          let cellHtml = '<div class="matrix-cell-content" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">';
          
          // 希望時間（小さく上に表示）
          if (dayData.desired) {
            cellHtml += `<div style="font-size:0.65rem; color:var(--c-text-muted); line-height:1;">(希)${dayData.desired.start}〜</div>`;
          } else {
            cellHtml += `<div style="font-size:0.65rem; color:transparent; line-height:1;">-</div>`;
          }
          
          // 確定時間（大きく下に表示）
          if (dayData.confirmed) {
            if (dayData.confirmed.start === '休み' || dayData.confirmed.start === '') {
              // 休みまたは空白
              cellHtml += `<div style="font-size:0.9rem; font-weight:700; color:var(--c-text-muted); margin-top:0.2rem;">休み</div>`;
            } else if (dayData.confirmed.start === 'フリー') {
              cellHtml += `<div class="matrix-cell-free" style="margin-top:0.2rem;">フリー</div>`;
            } else {
              cellHtml += `<div class="matrix-cell-shift" style="margin-top:0.2rem;">${dayData.confirmed.start}〜</div>`;
            }
          } else {
            // 未確定の場合は空白
            cellHtml += `<div style="font-size:0.9rem; font-weight:700; color:transparent; margin-top:0.2rem;">-</div>`;
          }
          cellHtml += '</div>';
          td.innerHTML = cellHtml;
          
          td.addEventListener('click', () => {
            selectedAdminDate = dateStr;
            openAdminEditModal(staffIdx, i, staff.name, dayData);
          });
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      };
      
      ['社員', 'ホール', 'キッチン', 'その他'].forEach(grp => {
        if (staffByGroup[grp].length > 0) {
          const sep = document.createElement('tr');
          sep.innerHTML = `<td colspan="${lastDate + 1}" style="background:hsl(210,40%,96%); font-weight:800; font-size:0.85rem; padding:0.4rem 1rem; color:var(--c-text-muted);">【${grp}】</td>`;
          tbody.appendChild(sep);
          staffByGroup[grp].forEach(staff => renderStaffRow(staff, adminStaffData.indexOf(staff)));
        }
      });
      
    } else if (currentMode === 'allshift') {
      // 確定シフトからユニークなスタッフリストを作成し、グループ分け
      const staffMap = new Map();
      monthlyAllShifts.forEach((shifts, dateStr) => {
        const day = parseInt(dateStr.split('-')[2]);
        shifts.forEach(s => {
          if (!staffMap.has(s.name)) {
            staffMap.set(s.name, { position: s.position, shifts: {} });
          }
          staffMap.get(s.name).shifts[day] = s.start;
        });
      });
      
      const staffByGroup = { '社員': [], 'ホール': [], 'キッチン': [], 'その他': [] };
      staffMap.forEach((data, name) => {
        const pos = data.position;
        if (pos === '社員' || pos === 'リーダー' || pos === '管理者') {
          staffByGroup['社員'].push({name, ...data});
        } else if (pos === 'ホール') {
          staffByGroup['ホール'].push({name, ...data});
        } else if (pos === 'キッチン') {
          staffByGroup['キッチン'].push({name, ...data});
        } else {
          staffByGroup['その他'].push({name, ...data});
        }
      });
      
      const renderAllShiftRow = (staffData) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="matrix-name-col">${staffData.name}</td>`;
        for (let i = 1; i <= lastDate; i++) {
          const td = document.createElement('td');
          const start = staffData.shifts[i];
          if (start && start !== '休み') {
            td.className = 'matrix-cell-clickable';
            if (start === 'フリー') {
              td.innerHTML = '<span class="matrix-cell-free">フリー</span>';
            } else {
              td.innerHTML = `<span class="matrix-cell-shift">${start}〜</span>`;
            }
          }
          const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
          td.addEventListener('click', () => openCoworkersModal(dateStr));
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      };
      
      ['社員', 'ホール', 'キッチン', 'その他'].forEach(grp => {
        if (staffByGroup[grp].length > 0) {
          const sep = document.createElement('tr');
          sep.innerHTML = `<td colspan="${lastDate + 1}" style="background:hsl(210,40%,96%); font-weight:800; font-size:0.85rem; padding:0.4rem 1rem; color:var(--c-text-muted);">【${grp}】</td>`;
          tbody.appendChild(sep);
          staffByGroup[grp].forEach(renderAllShiftRow);
        }
      });
    }
  }

    shiftRequests.clear();

    listEl.innerHTML = '';

  function executeSubmit() {
    closeSubmitConfirmModal();
    saveToGas();
  }
  function saveToGas() {
    if (!currentStaffId) { showToast('ログインしていません。', 'error'); return; }
    const targetMonth = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
    const payload = {
      staffId: currentStaffId,
      targetMonth: targetMonth,
      shifts: Array.from(shiftRequests.entries()).map(([date, data]) => ({ date, ...data }))
    };
    const btnSave = document.getElementById('btn-save-gas');
    const origHtml = btnSave.innerHTML;
    btnSave.innerHTML = '<span class="material-symbols-outlined" style="animation:spin 1s linear infinite;">sync</span> 送信中...';
    btnSave.disabled = true;
    if (typeof google === 'undefined') {
      setTimeout(() => {
        showToast('希望シフトを送信しました (デモ)');
        btnSave.innerHTML = origHtml;
        btnSave.disabled = false;
      }, 900);
      return;
    }
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          showToast('シフト希望を提出しました！');
          hasUnsavedChanges = false;
          updateSubmitButtonState();
          clearTempSave();
        } else {
          showToast('エラー: ' + res.message, 'error');
        }
        btnSave.innerHTML = origHtml;
        btnSave.disabled = false;
        refreshData();
      })
      .withFailureHandler(() => {
        showToast('通信エラーが発生しました。', 'error');
        btnSave.innerHTML = origHtml;
        btnSave.disabled = false;
      })
      .submitShiftRequests(payload);
  }

  // 従業員用：確定シフト・マイシフト詳細
  // =========================================
  function loadConfirmedShifts(doneCallback) {
    confirmedShifts.clear();
    shiftRequests.clear();
    setLoadingState(true);
    const targetMonth = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
    if (typeof google === 'undefined') {
      confirmedShifts.set(`${targetMonth}-05`, { start:'17:00', end:'22:00', restTime:'19:00-19:30', position:'キッチン' });
      confirmedShifts.set(`${targetMonth}-06`, { start:'17:00', end:'23:00', restTime:'20:00-20:45', position:'キッチン' });
      confirmedShifts.set(`${targetMonth}-10`, { start:'18:00', end:'22:00', restTime:'',  position:'キッチン' });
      confirmedShifts.set(`${targetMonth}-15`, { start:'11:00', end:'16:00', restTime:'',  position:'キッチン' });
      shiftRequests.set(`${targetMonth}-05`, { start:'17:00', end:'22:00', memo:'テスト' });

            if (doneCallback) doneCallback();

          .getConfirmedShifts(currentStaffId, targetMonth);
      })
      .withFailureHandler(e => { console.error('getSavedShiftRequests failed:', e); setLoadingState(false); if (doneCallback) doneCallback(); })
      .getSavedShiftRequests(currentStaffId, targetMonth);
  }
  function buildDetailCardHtml(shift, isConfirmed) {
    let workMinText = '';
    if (shift.start && shift.end && shift.start !== 'フリー' && shift.start !== '休み') {
      const [sh, sm] = shift.start.split(':').map(Number);
      const [eh, em] = shift.end.split(':').map(Number);
      let workMin = (eh * 60 + em) - (sh * 60 + sm);
      if (isConfirmed && shift.restTime) {
        const [rs, re] = shift.restTime.split('-');
        if (rs && re) {
          const [rsh, rsm] = rs.split(':').map(Number);
          const [reh, rem] = re.split(':').map(Number);
          workMin -= ((reh * 60 + rem) - (rsh * 60 + rsm));
        }
      }
      if (workMin < 0) workMin = 0;
      const wH = Math.floor(workMin / 60);
      const wM = workMin % 60;
      workMinText = `${wH}時間${wM > 0 ? wM + '分' : ''}`;
    } else {
      workMinText = '-';
    }
    
    const timeDisplay = shift.start === 'フリー' ? 'フリー' : (shift.start === '休み' ? '休み' : `${shift.start}${shift.end ? ' 〜 ' + shift.end : '〜'}`);
    
    if (isConfirmed) {
      return `
        <div class="confirmed-detail-card">
          <div class="confirmed-detail-row">
            <span class="confirmed-detail-label">勤務時間</span>
            <span class="confirmed-detail-val">${timeDisplay}</span>
          </div>
          <div class="confirmed-detail-row">
            <span class="confirmed-detail-label">休憩時間</span>
            <span class="confirmed-detail-val">${shift.restTime ? shift.restTime : 'なし'}</span>
          </div>
          <div class="confirmed-detail-row">
            <span class="confirmed-detail-label">実働時間目安</span>
            <span class="confirmed-detail-val" style="color:var(--c-primary);">${workMinText}</span>
          </div>
          <div class="confirmed-detail-row">
            <span class="confirmed-detail-label">ポジション</span>
            <span class="confirmed-detail-val"><span class="pos-badge ${shift.position}">${shift.position}</span></span>
          </div>
        </div>
      `;
    } else {
      return `
        <div class="confirmed-detail-card" style="border-color:hsl(350,80%,85%); background:var(--c-red-light);">
          <div class="confirmed-detail-row">
            <span class="confirmed-detail-label" style="color:var(--c-red);">希望時間</span>
            <span class="confirmed-detail-val" style="color:var(--c-red);">${timeDisplay}</span>
          </div>
          <div class="confirmed-detail-row" style="border-bottom:none;">
            <span class="confirmed-detail-label">メモ</span>
            <span class="confirmed-detail-val">${shift.memo || 'なし'}</span>
          </div>
        </div>
      `;
    }
  }
  function showConfirmedDetail(dateStr) {
    const [, m, d] = dateStr.split('-');
    const dayNames = ['日','月','火','水','木','金','土'];
    const dayName  = dayNames[new Date(dateStr).getDay()];

  function toggleWeekdaySelection(dayOfWeek) {
    const lastDate = new Date(currentYear, currentMonth, 0).getDate();
    const dates = [];
    for (let i = 1; i <= lastDate; i++) {
      const d = new Date(currentYear, currentMonth - 1, i);
      if (d.getDay() === dayOfWeek) {
        const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        if (currentHalfPeriod === 'first' && i > 15) continue;
        if (currentHalfPeriod === 'second' && i <= 15) continue;
        dates.push(dateStr);
      }
    }
    const allSelected = dates.every(d => selectedDates.has(d));
    dates.forEach(d => {
      if (allSelected) selectedDates.delete(d);
      else selectedDates.add(d);
    });
    updateWeekdayButtons();
    updateBatchInputUI();
    renderCalendar();
  }
  function updateWeekdayButtons() {
    const lastDate = new Date(currentYear, currentMonth, 0).getDate();
    const btns = document.querySelectorAll('.weekday-btn');
    btns.forEach((btn, idx) => {
      const dates = [];
      for (let i = 1; i <= lastDate; i++) {
        const d = new Date(currentYear, currentMonth - 1, i);
        if (d.getDay() === idx) {
          const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
          if (currentHalfPeriod === 'first' && i > 15) continue;
          if (currentHalfPeriod === 'second' && i <= 15) continue;
          dates.push(dateStr);
        }
      }
      const allSelected = dates.length > 0 && dates.every(d => selectedDates.has(d));
      btn.classList.toggle('active', allSelected);
    });
  }

  // =========================================
  function getTempSaveKey() {
    const month = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
    if (currentMode === 'submit') return `shift_temp_submit_${currentStaffId}_${month}`;
    if (currentMode === 'admin') return `shift_temp_admin_${month}`;
    return null;
  }
  function tempSave() {
    const key = getTempSaveKey();
    if (!key) return;
    if (currentMode === 'submit') {
      const data = {};
      shiftRequests.forEach((v, k) => { data[k] = v; });
      localStorage.setItem(key, JSON.stringify(data));
      showToast('一時保存しました');
    } else if (currentMode === 'admin') {
      localStorage.setItem(key, JSON.stringify(adminStaffData));
      showToast('一時保存しました');
    }
  }
  function loadTempSave() {
    const key = getTempSaveKey();
    if (!key) return false;
    const saved = localStorage.getItem(key);
    if (!saved) return false;
    try {
      if (currentMode === 'submit') {
        const data = JSON.parse(saved);
        shiftRequests.clear();
        Object.keys(data).forEach(k => shiftRequests.set(k, data[k]));
        hasUnsavedChanges = true;
        updateSubmitButtonState();
        renderCalendar();
        renderRequestList();
        showToast('一時保存データを復元しました');
        return true;
      } else if (currentMode === 'admin') {
        adminStaffData = JSON.parse(saved);
        renderCalendar();
        renderUnsubmittedStaffList();
        showToast('一時保存データを復元しました');
        return true;
      }
    } catch(e) {}
    return false;
  }
  function clearTempSave() {
    const key = getTempSaveKey();
    if (key) localStorage.removeItem(key);
  }
  function checkAndRestoreTempSave() {
    const key = getTempSaveKey();
    if (!key) return;
    const saved = localStorage.getItem(key);
    if (saved) loadTempSave();
  }
  // =========================================
  // 画面遷移・モード切替
  // =========================================
  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
    const calArea         = document.getElementById('calendar-area');
    const rightPanel      = document.getElementById('right-panel');
    const fabBtn          = document.getElementById('fab-btn');
    const btnSaveGas      = document.getElementById('btn-save-gas');
    const btnSaveAdmin    = document.getElementById('btn-save-admin');
    const btnTempSave     = document.getElementById('btn-temp-save');
    const pageTitle       = document.getElementById('page-title');
    const periodToggle    = document.getElementById('period-toggle-area');
    const inputSection    = document.getElementById('input-section');
    const detailSection   = document.getElementById('confirmed-detail-section');
    const adminSettings   = document.getElementById('admin-settings-section');
    const myshiftTabs     = document.getElementById('myshift-tabs');
    const adminDailyPanel = document.getElementById('admin-daily-panel');
    const listSection     = document.getElementById('list-section');
    const adminUnsubInline = document.getElementById('admin-unsubmitted-inline');
    // リセット
    adminDailyPanel.style.display = 'none';
    if (adminUnsubInline) adminUnsubInline.style.display = 'none';
    selectedAdminDate = null;
    if (mode === 'submit') {
      document.getElementById('nav-submit').classList.add('active');
      pageTitle.textContent = 'シフト希望提出';
      document.getElementById('list-title').textContent = '提出する希望一覧';
      calArea.style.display        = 'block';
      rightPanel.style.display     = 'flex';
      inputSection.style.display   = 'block';
      detailSection.style.display  = 'none';
      adminSettings.style.display  = 'none';
      listSection.style.display    = 'block';
      myshiftTabs.style.display    = 'none';
      document.getElementById('view-toggle-area').style.display = 'none';
      document.getElementById('half-toggle-area').style.display = 'flex';
      currentHalfPeriod = 'all';
      switchHalfPeriod('all');
      switchCalendarView('calendar');
      fabBtn.style.display         = '';
      btnSaveGas.style.display     = 'flex';
      btnSaveAdmin.style.display   = 'none';
      if (btnTempSave) btnTempSave.style.display = 'flex';
      // 次月のシフト希望提出をデフォルトに
      const next = new Date();
      next.setMonth(next.getMonth() + 1);
      currentYear  = next.getFullYear();
      currentMonth = next.getMonth() + 1;
      renderCalendar();
      loadHolidays(() => renderCalendar());
      loadSavedShiftRequests();
    }
    else if (mode === 'view') {
      document.getElementById('nav-myshift').classList.add('active');
      pageTitle.textContent = 'マイシフト';
      document.getElementById('list-title').textContent = '確定・希望リスト';
      calArea.style.display        = 'block';
      rightPanel.style.display     = 'flex';
      inputSection.style.display   = 'none';
      detailSection.style.display  = 'block';
      adminSettings.style.display  = 'none';
      listSection.style.display    = 'block';
      myshiftTabs.style.display    = 'flex';
      document.getElementById('view-toggle-area').style.display = 'none';
      document.getElementById('half-toggle-area').style.display = 'none';
      switchCalendarView('calendar');
      fabBtn.style.display         = 'none';
      btnSaveGas.style.display     = 'none';
      btnSaveAdmin.style.display   = 'none';
      if (btnTempSave) btnTempSave.style.display = 'none';
      currentYear  = new Date().getFullYear();
      currentMonth = new Date().getMonth() + 1;
      activeMyShiftTab = 'confirmed';
      document.getElementById('tab-btn-confirmed').classList.add('active');
      document.getElementById('tab-btn-desired').classList.remove('active');
      renderCalendar();
      loadHolidays(() => renderCalendar());
      loadConfirmedShifts();
    }
    else if (mode === 'allshift') {
      document.getElementById('nav-allshift').classList.add('active');
      pageTitle.textContent = '全体シフト';
      calArea.style.display        = 'block';
      rightPanel.style.display     = 'none';
      myshiftTabs.style.display    = 'none';
      document.getElementById('view-toggle-area').style.display = 'flex';
      document.getElementById('half-toggle-area').style.display = 'none';
      fabBtn.style.display         = 'none';
      btnSaveGas.style.display     = 'none';
      btnSaveAdmin.style.display   = 'none';
      if (btnTempSave) btnTempSave.style.display = 'none';
      currentYear  = new Date().getFullYear();
      currentMonth = new Date().getMonth() + 1;
      renderCalendar();
      loadHolidays(() => renderCalendar());
      loadMonthlyAllShifts();
    }
    else if (mode === 'admin') {
      document.getElementById('nav-admin').classList.add('active');
      pageTitle.textContent = 'シフト作成・編集';
      document.getElementById('list-title').textContent = 'システム設定';
      calArea.style.display        = 'block';
      rightPanel.style.display     = 'flex';
      inputSection.style.display   = 'none';
      detailSection.style.display  = 'none';
      adminSettings.style.display  = 'block';
      listSection.style.display    = 'none';
      myshiftTabs.style.display    = 'none';
      document.getElementById('view-toggle-area').style.display = 'flex';
      document.getElementById('half-toggle-area').style.display = 'none';
      fabBtn.style.display         = 'none';
      btnSaveGas.style.display     = 'none';
      btnSaveAdmin.style.display   = 'flex';
      if (btnTempSave) btnTempSave.style.display = 'flex';
      if (adminUnsubInline) adminUnsubInline.style.display = 'block';
      // 翌月編集をデフォルトに
      const next = new Date();
      next.setMonth(next.getMonth() + 1);
      currentYear  = next.getFullYear();
      currentMonth = next.getMonth() + 1;
      renderCalendar();
      loadHolidays(() => renderCalendar());
      loadAdminDesiredShifts();
    }
    if (window.innerWidth <= 900) closeBottomSheet();
  }
  // =========================================
  // UI補助・ユーティリティ
  // =========================================
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('right-panel-overlay').classList.toggle('show');
  }
  function openBottomSheet() {
    document.getElementById('right-panel').classList.add('open');
    document.getElementById('right-panel-overlay').classList.add('show');
  }
  function closeBottomSheet() {
    document.getElementById('right-panel').classList.remove('open');
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('right-panel-overlay').classList.remove('show');
  }
  function showToast(message, type = 'success') {
    const toast   = document.getElementById('toast');
    const msgSpan = document.getElementById('toast-message');
    msgSpan.textContent = message;
    toast.className = `toast toast-${type}`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }
</script>

    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }

    display: inline-block;
